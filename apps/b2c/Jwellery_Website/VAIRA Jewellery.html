<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VAIRA — Fine Jewellery</title>
<meta name="description" content="VAIRA — certified diamond and hallmarked gold fine jewellery. Crafted for generations. Retail, bridal and global manufacturing." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;1,6..96,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  #root{min-height:100vh}
  .boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:var(--navy-dark);color:#fff;z-index:999}
  .boot .mk{font-family:var(--serif);font-size:34px;letter-spacing:.34em;padding-left:.34em}
  .boot .sub{font-size:10px;letter-spacing:.42em;color:var(--champagne)}
  .boot .ld{width:60px;height:1px;background:rgba(255,255,255,.2);overflow:hidden;margin-top:8px}
  .boot .ld::after{content:"";display:block;height:100%;width:40%;background:var(--gold);animation:bl 1.1s var(--ease) infinite}
  @keyframes bl{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
  /* soft-corners tweak */
  body.soft-corners .btn,body.soft-corners .ph,body.soft-corners .ph::after,
  body.soft-corners .cat,body.soft-corners .prod-thumb,body.soft-corners .coll-media,
  body.soft-corners .tst,body.soft-corners .mfg-card,body.soft-corners .pdp-main,
  body.soft-corners .pdp-thumb,body.soft-corners .hero-figure,body.soft-corners .field input,
  body.soft-corners .field select,body.soft-corners .field textarea,body.soft-corners .opt-pill,
  body.soft-corners .map-ph,body.soft-corners .craft-media{border-radius:14px}
  body.soft-corners .ph::after{inset:14px;border-radius:8px}
</style>
</head>
<body>
  <div id="root">
    <div class="boot"><div class="mk">VAIRA</div><div class="sub">FINE JEWELLERY</div><div class="ld"></div></div>
  </div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- React Router v6 (UMD) — full dependency chain, order matters -->
  <script src="https://unpkg.com/@remix-run/router@1.19.2/dist/router.umd.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-router@6.26.2/dist/umd/react-router.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-router-dom@6.26.2/dist/umd/react-router-dom.production.min.js" crossorigin="anonymous"></script>

  <!-- App (order matters) -->
  <script type="text/babel" src="app/tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/icons.jsx"></script>
  <script type="text/babel" src="app/data.jsx"></script>
  <script type="text/babel" src="app/store.jsx"></script>
  <script type="text/babel" src="app/nav.jsx"></script>
  <script type="text/babel" src="app/footer.jsx"></script>
  <script type="text/babel" src="app/home.jsx"></script>
  <script type="text/babel" src="app/listing.jsx"></script>
  <script type="text/babel" src="app/detail.jsx"></script>
  <script type="text/babel" src="app/pages.jsx"></script>
  <script type="text/babel" src="app/app.jsx"></script>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0A1F44"/>
      <path d="M30 44 L38 33 H62 L70 44 L50 72 Z" fill="none" stroke="#C9A227" stroke-width="1.6"/>
      <path d="M30 44 H70 M38 33 L43 44 L50 72 M62 33 L57 44 L50 72 M43 44 H57" fill="none" stroke="#C9A227" stroke-width="1"/>
    </svg>
  </template>
</body>
</html>
